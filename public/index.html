<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TempMail — Hotmail OTP Catcher</title>
  <meta name="description" content="Self-hosted temporary email system powered by your own Hotmail accounts. Get verification codes instantly.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header id="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M22 4L12 13L2 4"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>TempMail</h1>
          <span class="brand-sub">Hotmail OTP Catcher</span>
        </div>
      </div>
      <div class="header-stats">
        <div class="stat-chip" id="stat-total">
          <span class="stat-dot available"></span>
          <span id="total-count">0</span> Emails
        </div>
        <div class="stat-chip" id="stat-watching">
          <span class="stat-dot watching"></span>
          <span id="watching-count">0</span> Watching
        </div>
        <div class="stat-chip" id="stat-codes">
          <span class="stat-dot code-found"></span>
          <span id="codes-count">0</span> Codes
        </div>
      </div>
    </div>
  </header>

  <!-- Active Code Banner (shown when a code is found) -->
  <div id="code-banner" class="code-banner hidden">
    <div class="code-banner-inner">
      <div class="code-banner-info">
        <span class="code-banner-label">🔑 Verification Code Found</span>
        <span class="code-banner-email" id="code-banner-email"></span>
      </div>
      <div class="code-banner-code-wrap">
        <div class="code-banner-code" id="code-banner-code"></div>
        <button class="code-copy-btn" id="btn-copy-code" title="Copy code">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
      <div class="code-banner-meta">
        <span id="code-banner-from"></span>
        <span id="code-banner-subject"></span>
      </div>
    </div>
  </div>

  <!-- Search & Filter Bar -->
  <div class="toolbar">
    <div class="search-box">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search emails..." autocomplete="off">
    </div>
    <div class="filter-chips">
      <button class="filter-chip active" data-filter="all">All</button>
      <button class="filter-chip" data-filter="available">Available</button>
      <button class="filter-chip" data-filter="watching">Watching</button>
      <button class="filter-chip" data-filter="code_found">Has Code</button>
    </div>
  </div>

  <!-- Email Grid -->
  <main id="email-grid" class="email-grid">
    <!-- Populated by JS -->
  </main>

  <!-- Empty State -->
  <div id="empty-state" class="empty-state hidden">
    <div class="empty-icon">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.3">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="M22 4L12 13L2 4"/>
      </svg>
    </div>
    <h2>No Accounts Found</h2>
    <p>Add your Hotmail accounts to <code>accounts.txt</code> and restart the server.</p>
    <p class="empty-format">Format: <code>email@hotmail.com:password</code></p>
  </div>

  <!-- Loading State -->
  <div id="loading-state" class="loading-state">
    <div class="loader"></div>
    <p>Connecting to server...</p>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Connection Status -->
  <div id="connection-status" class="connection-status">
    <span class="conn-dot"></span>
    <span class="conn-text">Connected</span>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
